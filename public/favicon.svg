<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#863bff"/>

  <!-- Subtle inner glow -->
  <circle cx="24" cy="24" r="24" fill="url(#glow)" opacity="0.4"/>

  <!-- Note stem -->
  <line x1="30" y1="10" x2="30" y2="33" stroke="#ede6ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Note flag (beam) -->
  <path d="M30 10 Q40 14 36 22" stroke="#ede6ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Note head (filled oval) -->
  <ellipse cx="26.5" cy="34" rx="5.5" ry="3.8" fill="#ede6ff" transform="rotate(-18 26.5 34)"/>

  <!-- Small 2×2 chord grid (bottom-left) -->
  <rect x="10" y="26" width="5" height="5" rx="1.2" fill="#ede6ff" opacity="0.9"/>
  <rect x="16.5" y="26" width="5" height="5" rx="1.2" fill="#ede6ff" opacity="0.55"/>
  <rect x="10" y="32.5" width="5" height="5" rx="1.2" fill="#ede6ff" opacity="0.55"/>
  <rect x="16.5" y="32.5" width="5" height="5" rx="1.2" fill="#ede6ff" opacity="0.3"/>

  <defs>
    <radialGradient id="glow" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#b97dff"/>
      <stop offset="100%" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
